# ============================================================
# TELECOM RCA ANALYZER CONFIGURATION
# ============================================================

# IMPORTANT:
# This file contains ONLY configuration data (YAML format).
# Do NOT put this inside config.py.


# ============================================================
# TSHARK SETTINGS
# ============================================================
tshark:

  # Path to tshark binary
  # "auto" → auto-detect (recommended)
  binary: "auto"

  # Timeout per execution (seconds)
  timeout_sec: 120

  # Extra flags:
  # -n → disable DNS resolution (faster)
  # -2 → enable 2-pass decoding (important for SIP reassembly)
  extra_flags:
    - "-n"
    - "-2"


# ============================================================
# DATA PATHS
# ============================================================
data:

  # Input PCAP files
  raw_pcaps: "data/raw_pcaps"

  # Parsed packet outputs (debugging)
  parsed: "data/parsed"

  # Feature store for ML
  features: "data/features"

  # Trained ML models
  models: "data/models"

  # Persistent self-learning knowledge base
  knowledge_base: "data/knowledge_base"

  # Portable distilled intelligence exports
  skill_files: "data/skill_files"


# ============================================================
# WEB SERVER CONFIG
# ============================================================
server:

  # Listen on all interfaces
  host: "0.0.0.0"

  # UI port
  port: 5050

  # Flask debug should stay false in production
  debug: false

  # Upload/API controls
  max_upload_mb: 500
  allowed_extensions:
    - ".pcap"
    - ".pcapng"
    - ".cap"
  session_ttl_sec: 3600
  max_cached_uploads: 20
  cors_origins:
    - "http://localhost:5050"
    - "http://127.0.0.1:5050"

auth:
  token: ""


# ============================================================
# CORRELATION ENGINE (CRITICAL)
# ============================================================
correlation:

  # Time window (seconds)
  # Used only as FILTER, not primary logic
  window_sec: 5

  # IMPORTANT:
  # false → identity-based correlation only (RECOMMENDED)
  # true  → allow time-only fallback (lab use only)
  fallback_time_only: false

  # Minimum Diameter packets required to confirm correlation
  min_dia_overlap: 2


# ============================================================
# TRAINING CONFIG
# ============================================================
training:

  # Random seed (reproducibility)
  random_state: 42

  # Train/test split ratio
  test_size: 0.2

  # Label noise to prevent overfitting
  label_noise_ratio: 0.05

  # Cross-validation folds
  cv_folds: 5

  # Synthetic samples per RCA class
  synthetic_per_class: 80

  # XGBoost hyperparameters
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8


# ============================================================
# EVALUATION CONFIG
# ============================================================
evaluation:

  # Ensure same PCAP not split across train/test
  group_split: true

  # Minimum samples per class
  min_class_support: 3


# ============================================================
# MODEL CONFIG
# ============================================================
model:

  # Where trained model is stored
  path: "data/models/rca_model.pkl"
  ranking_path: "data/models/ranking_model.pkl"
  confidence_calibration_path: "data/models/confidence_calibrator.pkl"
  encoder_path: "data/models/label_encoder.pkl"
  meta_path: "data/models/model_meta.json"


# ============================================================
# BENCHMARK / GOLDEN TRACE CONFIG
# ============================================================
benchmarks:
  dir: "benchmarks"
  roots:
    - "benchmarks/golden_traces"
    - "data/raw_pcaps"
  # Add local-only benchmark roots via environment override when needed:
  # TC_RCA__BENCHMARKS__ROOTS="/abs/path/one,/abs/path/two"
    - "/Users/shivendraraj/Documents/Test Cases"


# ============================================================
# SELF-LEARNING RCA INTELLIGENCE
# ============================================================
learning:
  enabled: true
  compact_on_upload: false
  compact_on_batch: true
  export_skill_on_upload: false
  export_skill_on_batch: false
  feedback_retrain_enabled: true
  feedback_min_samples: 3
  feedback_dataset_path: "data/knowledge_base/feedback_dataset.jsonl"
  feedback_drift_detection_enabled: true
  feedback_max_label_drift: 0.55
  feedback_max_protocol_drift: 0.6
  feedback_max_technology_drift: 0.6
  feedback_max_avg_duration_ratio_delta: 2.5
  feedback_promotion_enabled: true
  feedback_candidate_dir: "data/models/candidates"
  feedback_min_candidate_pass_rate: 1.0
  feedback_max_pass_rate_drop: 0.0
  feedback_max_failed_case_increase: 0
  feedback_max_avg_abnormal_priority_drop: 3.0


# ============================================================
# AUTONOMOUS RCA INTELLIGENCE
# ============================================================
autonomous:
  enabled: true
  causal_window_ms: 5000
  validation_confidence_threshold: 0.58
  streaming_batch_size: 500
  timeseries_enabled: true
  watch_paths:
    - "data/raw_pcaps"
  poll_interval_sec: 60
  auto_commit: true
  auto_push: false
  max_unknown_ratio: 0.35
  max_validation_queue_growth: 25
  max_pattern_drop: 0
  benchmark_enabled: true
  benchmark_suite: "benchmarks/expected_results.json"
  min_benchmark_pass_rate: 1.0
  run_reports_dir: "data/knowledge_base/run_reports"
  curated_seed_files:
    - "knowledge_graph.json"
    - "metrics.json"
    - "patterns.json"
    - "timeseries_intelligence.json"
    - "vectors.json"


# ============================================================
# LOGGING CONFIG
# ============================================================
logging:
  level: "INFO"
  log_to_file: true
  log_file: "logs/app.log"
  rotation: "10 MB"
  retention: "14 days"
