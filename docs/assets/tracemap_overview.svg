<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #10233f; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #334155; }
      .head { font: 700 18px Arial, sans-serif; fill: #10233f; }
      .body { font: 400 14px Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .boxA { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 16; ry: 16; }
      .boxB { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 16; ry: 16; }
      .boxC { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 16; ry: 16; }
      .boxD { fill: #fce7f3; stroke: #db2777; stroke-width: 2; rx: 16; ry: 16; }
      .boxE { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 16; ry: 16; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1360" height="1000" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="24" ry="24"/>

  <text x="50" y="70" class="title">TraceMAP RCA Workbench</text>
  <text x="50" y="100" class="subtitle">Telecom packet decoding, correlated RCA, autonomous learning, and git-backed seed intelligence</text>

  <rect x="50" y="140" width="250" height="120" class="boxA"/>
  <text x="70" y="175" class="head">1. Input Layer</text>
  <text x="70" y="205" class="body">Raw PCAP / PCAPNG traces</text>
  <text x="70" y="228" class="body">Upload UI or watched folder</text>

  <rect x="350" y="140" width="280" height="120" class="boxA"/>
  <text x="370" y="175" class="head">2. Decode Layer</text>
  <text x="370" y="205" class="body">tshark extraction and normalization</text>
  <text x="370" y="228" class="body">Protocol-specific field capture</text>

  <rect x="680" y="140" width="320" height="120" class="boxB"/>
  <text x="700" y="175" class="head">3. Protocol Parsers</text>
  <text x="700" y="205" class="body">SIP, Diameter, INAP, GTP, PFCP</text>
  <text x="700" y="228" class="body">NGAP, S1AP, RANAP, MAP, NAS, SCTP</text>

  <rect x="1050" y="140" width="290" height="120" class="boxB"/>
  <text x="1070" y="175" class="head">4. Session Correlation</text>
  <text x="1070" y="205" class="body">Cross-protocol session building</text>
  <text x="1070" y="228" class="body">Compaction and stitching</text>

  <rect x="50" y="350" width="270" height="140" class="boxC"/>
  <text x="70" y="385" class="head">5. Rule-Based RCA</text>
  <text x="70" y="415" class="body">Telecom RCA labels</text>
  <text x="70" y="438" class="body">Evidence, confidence, severity</text>
  <text x="70" y="461" class="body">Next-action guidance</text>

  <rect x="370" y="350" width="290" height="140" class="boxD"/>
  <text x="390" y="385" class="head">6. Autonomous RCA</text>
  <text x="390" y="415" class="body">Agent votes and causal inference</text>
  <text x="390" y="438" class="body">Knowledge graph signals</text>
  <text x="390" y="461" class="body">Time-series intelligence</text>

  <rect x="710" y="350" width="290" height="140" class="boxD"/>
  <text x="730" y="385" class="head">7. Learning Loop</text>
  <text x="730" y="415" class="body">Pattern reuse and reinforcement</text>
  <text x="730" y="438" class="body">Candidate generation</text>
  <text x="730" y="461" class="body">Validation queueing</text>

  <rect x="1050" y="350" width="290" height="140" class="boxE"/>
  <text x="1070" y="385" class="head">8. Knowledge Base</text>
  <text x="1070" y="415" class="body">patterns.json</text>
  <text x="1070" y="438" class="body">knowledge_graph.json / vectors.json</text>
  <text x="1070" y="461" class="body">metrics.json / time-series memory</text>

  <rect x="50" y="590" width="330" height="150" class="boxE"/>
  <text x="70" y="625" class="head">9. Analyst UI</text>
  <text x="70" y="655" class="body">Trace overview and RCA details</text>
  <text x="70" y="678" class="body">Autonomous reasoning and validation queue</text>
  <text x="70" y="701" class="body">Persistent GUI-configured learning path</text>

  <rect x="440" y="590" width="360" height="150" class="boxC"/>
  <text x="460" y="625" class="head">10. Autonomous Watcher</text>
  <text x="460" y="655" class="body">Discovers new traces from saved path</text>
  <text x="460" y="678" class="body">Runs supervised or continuous learning cycles</text>
  <text x="460" y="701" class="body">Writes per-cycle run reports</text>

  <rect x="860" y="590" width="480" height="150" class="boxA"/>
  <text x="880" y="625" class="head">11. Gated Publish Pipeline</text>
  <text x="880" y="655" class="body">Quality gates: changed seed files, UNKNOWN ratio, validation growth, pattern stability</text>
  <text x="880" y="678" class="body">Curated auto-commit and auto-push to git</text>
  <text x="880" y="701" class="body">Operational state kept separate from seed intelligence</text>

  <rect x="50" y="810" width="1290" height="160" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="18" ry="18"/>
  <text x="70" y="845" class="head">Operational Flow</text>
  <text x="70" y="880" class="body">Trace arrives → decode with tshark → parse and normalize → correlate sessions → compact and stitch → RCA and autonomous reasoning → learn patterns → gate seed refresh → commit/push curated knowledge → UI and run report update</text>
  <text x="70" y="920" class="body">Standout strengths: mixed 2G/3G/4G/5G + IMS coverage, telecom-native RCA, UNKNOWN reduction on real IRAT traces, self-learning with git-backed persistence, and production-oriented autonomy guards</text>

  <line x1="300" y1="200" x2="350" y2="200" class="arrow"/>
  <line x1="630" y1="200" x2="680" y2="200" class="arrow"/>
  <line x1="1000" y1="200" x2="1050" y2="200" class="arrow"/>

  <line x1="1180" y1="260" x2="1180" y2="350" class="arrow"/>
  <line x1="845" y1="260" x2="845" y2="350" class="arrow"/>
  <line x1="490" y1="260" x2="490" y2="350" class="arrow"/>

  <line x1="320" y1="420" x2="370" y2="420" class="arrow"/>
  <line x1="660" y1="420" x2="710" y2="420" class="arrow"/>
  <line x1="1000" y1="420" x2="1050" y2="420" class="arrow"/>

  <line x1="1180" y1="490" x2="1180" y2="590" class="arrow"/>
  <line x1="855" y1="490" x2="855" y2="590" class="arrow"/>
  <line x1="515" y1="490" x2="515" y2="590" class="arrow"/>

  <line x1="380" y1="665" x2="440" y2="665" class="arrow"/>
  <line x1="800" y1="665" x2="860" y2="665" class="arrow"/>
  <line x1="1090" y1="590" x2="1090" y2="490" class="arrow dashed"/>
  <line x1="575" y1="590" x2="575" y2="490" class="arrow dashed"/>

  <text x="1110" y="560" class="small">seed updates</text>
  <text x="595" y="560" class="small">learn from new traces</text>
</svg>
